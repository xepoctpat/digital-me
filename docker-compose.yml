services:
  backend:
    build:
      context: .
      dockerfile: ${DOCKER_BACKEND_DOCKERFILE:-Dockerfile.backend}
    container_name: second-me-backend
    restart: unless-stopped
    ports:
      - "8002:8002"
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./run:/app/run
      - ./resources:/app/resources
      - ./docker:/app/docker
      - ./.env:/app/.env
      - llama-cpp-build:/app/llama.cpp/build  # Persist the llama.cpp build
    environment:
      # Environment variables
      - LOCAL_APP_PORT=8002
      - IN_DOCKER_ENV=1
      - PLATFORM=${PLATFORM:-linux}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          # Set container memory limit to 64GB
          memory: 64G
        reservations:
          # Memory reservation
          memory: 6G
    networks:
      - second-me-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: second-me-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - ./logs:/app/logs
      - ./resources:/app/resources
    environment:
      - VITE_API_BASE_URL=http://backend:8002
      - LOCAL_APP_PORT=8002
      - ENABLE_PUBLIC_NETWORK=${ENABLE_PUBLIC_NETWORK:-false}
      - PUBLIC_APP_BASE_URL=${PUBLIC_APP_BASE_URL:-https://app.secondme.io}
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          # Set container memory limit to 2GB
          memory: 2G
        reservations:
          # Memory reservation
          memory: 1G
    networks:
      - second-me-network

  ollama:
    image: ollama/ollama:latest
    container_name: second-me-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ollama-data:/root/.ollama
      - ./logs:/app/logs
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_MODELS=/root/.ollama/models
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    networks:
      - second-me-network
    profiles:
      - llm

networks:
  second-me-network:
    driver: bridge

volumes:
  llama-cpp-build:
    driver: local
  ollama-data:
    driver: local
